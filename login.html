<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Access Gateway - Sign In</title>
    <!-- FontAwesome Vector Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black text-white antialiased flex items-center justify-center min-h-screen p-4 selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="w-full max-w-sm bg-zinc-950 border border-zinc-900 rounded-2xl p-6 md:p-8 shadow-2xl space-y-6">
        
        <!-- Identity Branding Header -->
        <div class="text-center space-y-2">
            <a href="index.html" class="inline-flex items-center gap-2 group">
                <img src="logo/logo.png" alt="Studio Logo" class="w-7 h-7 rounded-lg group-hover:scale-105 transition-transform" onerror="this.src='logo.png'">
                <span class="font-black text-xs tracking-wider uppercase text-emerald-400">AI Studio</span>
            </a>
            <h1 class="text-lg font-black tracking-tight text-zinc-100 pt-2">Welcome Back Producer</h1>
            <p class="text-xs text-zinc-500">Sign in to unlock master track stems and dynamic tools.</p>
        </div>

        <!-- System Authentication Portal Form -->
        <form id="studio-login-form" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Email Address</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-[11px]"></i>
                    <input type="email" id="login-email" required placeholder="producer@studio.com"
                           class="w-full h-10 bg-zinc-900 border border-zinc-800 text-xs pl-9 pr-3 rounded focus:outline-none focus:border-emerald-500 text-white transition-colors">
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Access Signature</label>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-[11px]"></i>
                    <input type="password" id="login-password" required placeholder="••••••••"
                           class="w-full h-10 bg-zinc-900 border border-zinc-800 text-xs pl-9 pr-3 rounded focus:outline-none focus:border-emerald-500 text-white transition-colors">
                </div>
            </div>

            <div class="flex items-center gap-2 pt-1">
                <input type="checkbox" id="login-remember" class="accent-emerald-500 rounded cursor-pointer">
                <label for="login-remember" class="text-[11px] text-zinc-400 font-medium select-none cursor-pointer">Remember device session keys</label>
            </div>

            <button type="submit" class="w-full h-10 bg-emerald-500 text-black font-bold text-xs rounded hover:bg-emerald-400 active:scale-[0.99] transition-all cursor-pointer shadow-md tracking-wider uppercase">
                Verify Identity
            </button>
        </form>

        <div class="h-[1px] bg-zinc-900"></div>

        <!-- Footer Redirect Actions -->
        <p class="text-center text-xs text-zinc-500">
            New to the platform? 
            <a href="signup.html" class="text-emerald-400 font-bold hover:underline transition-all">Create an Account</a>
        </p>
    </div>

    <!-- System Handshake Processing Layers -->
    <script src="js/auth.js"></script>
    <script>
        // Custom redirection intercept logic for standalone view states
        document.addEventListener("DOMContentLoaded", () => {
            const standaloneLoginForm = document.getElementById("studio-login-form");
            if (standaloneLoginForm) {
                standaloneLoginForm.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const email = document.getElementById("login-email").value;
                    const pass = document.getElementById("login-password").value;
                    const remember = document.getElementById("login-remember")?.checked || false;

                    // Execute core calculation profile match inside auth.js
                    const result = executeClientAuthentication(email, pass, remember);
                    
                    if (result.success) {
                        // Check if download.js left a tracking parameter return query
                        const urlParams = new URLSearchParams(window.location.search);
                        if (urlParams.get('redirect') === 'downloads') {
                            window.location.href = "index.html";
                        } else {
                            window.location.href = "index.html";
                        }
                    } else {
                        alert(result.msg);
                    }
                });
            }
        });
    </script>
</body>
</html>
