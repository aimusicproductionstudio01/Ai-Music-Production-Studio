<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Ai Music Production Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- FIXED BACK LINK -->
    <div class="p-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-xs text-zinc-400 hover:text-white font-bold tracking-wider uppercase transition-colors">
            <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to Dashboard
        </a>
    </div>

    <!-- MAIN LOGIN CARD -->
    <main class="w-full max-w-md mx-auto px-6 py-8">
        <div class="bg-zinc-900/50 border border-zinc-850 rounded-3xl p-8 space-y-6 shadow-2xl backdrop-blur-md">
            
            <!-- HEADER NODE -->
            <div class="space-y-2 text-center">
                <div class="flex justify-center">
                    <img src="logo.png" alt="Studio Logo" class="h-12 w-12 rounded-full object-cover border border-zinc-800">
                </div>
                <h1 class="text-2xl font-black tracking-wide text-white uppercase pt-2">Welcome Back</h1>
                <p class="text-xs text-zinc-400">Log in to manage your tracks, save playlists, and read lyrics.</p>
            </div>

            <!-- INTERACTIVE LOGIN FORM -->
            <form id="auth-login-form" onsubmit="handleUserLogin(event)" class="space-y-4">
                
                <div class="space-y-1.5">
                    <label for="login-email" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Email Address</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                        <input type="email" id="login-email" required placeholder="name@example.com" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none focus:border-emerald-500 text-zinc-200 transition-colors">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex items-center justify-between">
                        <label for="login-password" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-[10px] text-emerald-400 hover:underline font-bold">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                        <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none focus:border-emerald-500 text-zinc-200 transition-colors">
                    </div>
                </div>

                <div class="flex items-center gap-2 pt-1">
                    <input type="checkbox" id="remember-me" class="rounded border-zinc-800 bg-zinc-950 text-emerald-500 focus:ring-0 w-3.5 h-3.5 cursor-pointer">
                    <label for="remember-me" class="text-[11px] text-zinc-400 select-none cursor-pointer">Remember my device signature loop</label>
                </div>

                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xs py-3.5 rounded-xl transition-all tracking-wider uppercase shadow-lg mt-2 cursor-pointer">
                    SIGN IN TO ACCOUNT <i class="fa-solid fa-right-to-bracket ml-1 text-[10px]"></i>
                </button>
            </form>

            <div class="relative flex py-2 items-center text-[10px] text-zinc-600 font-bold uppercase tracking-widest">
                <div class="flex-grow border-t border-zinc-850"></div>
                <span class="flex-shrink mx-3">OR CONNECT VIA</span>
                <div class="flex-grow border-t border-zinc-850"></div>
            </div>

            <!-- EXTERNAL ACCELERATORS -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="alert('Social loop mock active')" class="flex items-center justify-center gap-2 bg-zinc-950 hover:bg-zinc-900 border border-zinc-800 text-xs py-2.5 rounded-xl transition-colors font-medium text-zinc-300 cursor-pointer">
                    <i class="fa-brands fa-google text-red-500"></i> Google
                </button>
                <button onclick="alert('Social loop mock active')" class="flex items-center justify-center gap-2 bg-zinc-950 hover:bg-zinc-900 border border-zinc-800 text-xs py-2.5 rounded-xl transition-colors font-medium text-zinc-300 cursor-pointer">
                    <i class="fa-brands fa-facebook text-blue-500"></i> Facebook
                </button>
            </div>

            <!-- FOOTER SWITCHLINK -->
            <p class="text-center text-xs text-zinc-500 pt-2">
                New to the Studio platform? <a href="signup.html" class="text-emerald-400 font-bold hover:underline">Create an account</a>
            </p>

        </div>
    </main>

    <!-- CLEAN SYSTEM FOOTER -->
    <footer class="text-center py-6 text-[11px] text-zinc-600 border-t border-zinc-900 bg-zinc-950">
        &copy; 2026 Ai Music Production Studio. Authorization secured via JWT matrix tracking.
    </footer>

    <!-- INTERACTIVE SYSTEM SCRIPT HUB -->
    <script>
        // AUTOMATIC REDIRECT IF ALREADY LOGGED IN
        if (localStorage.getItem("loggedIn")) {
            window.location = "index.html";
        }

        // MATCHING LOGIN LOGIC PROCESSING ENGINE
        function handleUserLogin(event) {
            event.preventDefault();

            const email = document.getElementById("login-email").value.trim().toLowerCase();
            const passwordInput = document.getElementById("login-password").value;

            // Target matching string identity schema key
            const storedUserData = localStorage.getItem("user_" + email);

            if (!storedUserData) {
                alert("User does not exist.");
                return;
            }

            const user = JSON.parse(storedUserData);

            // TRY-CATCH ERROR HANDLING FOR DECODING BASE64 STRINGS
            try {
                if (atob(user.password) !== passwordInput) {
                    alert("Incorrect password.");
                    return;
                }
            } catch(error) {
                alert("Account data format error. Please create a new account.");
                return;
            }

            // Set state verification metrics
            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("currentUser", email);

            alert("Login successful!");
            window.location = "index.html";
        }
    </script>
</body>
</html>
