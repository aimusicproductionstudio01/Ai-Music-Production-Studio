<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Production Studio</title>
    
    <!-- FontAwesome Vector Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Core Application Component Layouts -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="bg-black text-white antialiased selection:bg-emerald-500/30 selection:text-emerald-400">

    <!-- ==========================================================================
       TOP NAVIGATION BAR & IDENTITY DECK
       ========================================================================== -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-zinc-950/80 backdrop-blur-md border-b border-zinc-900 px-6 flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <img src="logo/logo.png" alt="Studio Logo" class="w-8 h-8 rounded-lg shadow-md" onerror="this.src='logo.png'">
            <span class="font-black text-sm tracking-wider uppercase text-emerald-400">AI Studio</span>
        </div>
        
        <!-- Interactive Unified Search Target Hub -->
        <div class="flex-1 max-w-md mx-6">
            <div class="relative w-full">
                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Search by title, language, genre..." 
                       class="w-full h-9 bg-zinc-900 border border-zinc-800 rounded-full pl-10 pr-4 text-xs font-medium text-white placeholder:text-zinc-500 focus:outline-none focus:border-emerald-500 transition-colors">
            </div>
        </div>

        <!-- Identity Matrix Slot (Populated dynamically via auth.js + app.js) -->
        <nav id="auth-nav-slot">
            <a href="login.html" class="text-xs font-bold text-zinc-400 hover:text-white transition-colors cursor-pointer tracking-wide">
                Sign In
            </a>
        </nav>
    </header>

    <!-- ==========================================================================
       MAIN DASHBOARD GRID STRATA
       ========================================================================== -->
    <main class="pt-24 pb-32 max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- LEFT/CENTER SECTOR: PLATFORM FLOW STREAM (3 Columns) -->
        <div class="lg:col-span-3 space-y-10">
            
            <!-- Dynamic Component: Featured Hero Banner Section -->
            <section id="featured-hero" class="relative rounded-2xl overflow-hidden min-h-[280px] bg-zinc-950 border border-zinc-900 flex flex-col justify-end p-8 group">
                <img id="hero-thumbnail" src="" class="absolute inset-0 w-full h-full object-cover opacity-20 group-hover:scale-105 transition-transform duration-700" alt="">
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/50 to-transparent"></div>
                
                <div class="relative z-10 space-y-3 max-w-xl">
                    <span id="hero-tag" class="text-[9px] font-black tracking-widest uppercase bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full border border-emerald-500/20 inline-block">Featured Master</span>
                    <h1 id="hero-title" class="text-2xl md:text-4xl font-black tracking-tight leading-none text-white">Loading Master Track...</h1>
                    <p id="hero-desc" class="text-xs md:text-sm text-zinc-400 leading-relaxed">Initializing dynamic studio presentation layer elements...</p>
                    <div class="pt-2">
                        <button id="hero-play-btn" class="bg-white text-black text-xs font-bold px-6 h-10 rounded-full flex items-center gap-2 hover:scale-105 active:scale-95 transition-transform cursor-pointer shadow-lg">
                            <i class="fa-solid fa-play text-[10px]"></i> Play Production
                        </button>
                    </div>
                </div>
            </section>

            <!-- Dynamic Component: New Releases Dynamic Grid Section -->
            <section class="space-y-4">
                <h2 class="text-base font-black uppercase tracking-wider text-zinc-200 flex items-center gap-2">
                    <span class="w-1.5 h-3 bg-emerald-500 rounded-sm"></span> New Releases
                </h2>
                <div id="new-releases-container" class="song-grid grid grid-cols-2 md:grid-cols-3 gap-4">
                    <!-- Cards dynamically generated via app.js -->
                </div>
            </section>

            <!-- Dynamic Component: Trending Dynamic Row Grid Section -->
            <section class="space-y-4">
                <h2 class="text-base font-black uppercase tracking-wider text-zinc-200 flex items-center gap-2">
                    <span class="w-1.5 h-3 bg-amber-500 rounded-sm"></span> Trending Tracks
                </h2>
                <div id="trending-songs-container" class="region-grid grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Cards dynamically generated via app.js -->
                </div>
            </section>

            <!-- Dynamic Component: Latest / Master Catalog Section -->
            <section class="space-y-4">
                <h2 class="text-base font-black uppercase tracking-wider text-zinc-200 flex items-center gap-2">
                    <span class="w-1.5 h-3 bg-blue-500 rounded-sm"></span> Full Catalog Production Stems
                </h2>
                <div id="all-songs-grid" class="song-grid grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Cards dynamically generated via app.js -->
                </div>
            </section>
        </div>

        <!-- RIGHT SIDEBAR: AUXILIARY MANAGEMENT PANELS (1 Column) -->
        <aside class="space-y-8 lg:col-span-1">
            
            <!-- Dynamic Component: Upcoming Releases Feed Section -->
            <section class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400">Upcoming Drops</h3>
                <div id="upcoming-container" class="space-y-3">
                    <!-- Content dynamically generated via app.js -->
                </div>
            </section>

            <!-- Dynamic Component: Language Routers Directory Section -->
            <section class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400">Language Hubs</h3>
                <div id="language-playlists-container" class="divide-y divide-zinc-900/50">
                    <!-- Content dynamically generated via app.js -->
                </div>
            </section>

            <!-- Dynamic Component: Broadcast Studio News Feed Section -->
            <section class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900 space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-zinc-400">Studio Broadcast News</h3>
                <div id="news-feed-container" class="space-y-3">
                    <!-- Content dynamically generated via app.js -->
                </div>
            </section>

            <!-- Telemetry System Counter Display Widget Section -->
            <section class="p-4 bg-zinc-950/40 rounded-xl border border-zinc-900/60 flex items-center justify-around text-center">
                <div>
                    <span id="analytics-total-visitors" class="block text-sm font-mono font-bold text-white">0</span>
                    <span class="text-[9px] uppercase tracking-widest text-zinc-600 font-bold">Unique Visitors</span>
                </div>
                <div class="h-6 w-[1px] bg-zinc-900"></div>
                <div>
                    <span id="analytics-total-views" class="block text-sm font-mono font-bold text-white">0</span>
                    <span class="text-[9px] uppercase tracking-widest text-zinc-600 font-bold">Page Views</span>
                </div>
            </section>
        </aside>
    </main>

    <!-- ==========================================================================
       ISOLATED CORE SYSTEM COMPONENT LAYOUTS (STICKY PLAYER & OVERLAYS)
       ========================================================================== -->
    
    <!-- 🎵 Spotify-Style Sticky Bottom Audio Player Wrapper -->
    <footer id="sticky-audio-player" class="hidden">
        <!-- Structural components are injected and configured via player.js -->
    </footer>

    <!-- 📜 Dynamic Overlay Popup Component: Live Synchronized Lyrics Terminal -->
    <div id="lyrics-panel" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[10000] hidden items-center justify-center p-6 opacity-0 transition-opacity duration-350 pointer-events-none">
        <button id="close-lyrics-btn" class="absolute top-6 right-6 w-10 h-10 rounded-full border border-zinc-800 bg-zinc-900 text-zinc-400 hover:text-white flex items-center justify-center transition-colors cursor-pointer">
            <i class="fa-solid fa-xmark text-sm"></i>
        </button>
        <div class="max-w-xl w-full flex flex-col max-h-[80vh]">
            <h2 id="lyrics-track-title" class="text-center font-black text-lg text-emerald-400 mb-8 tracking-wide">Track Transcription</h2>
            <div id="lyrics-body" class="overflow-y-auto px-4 custom-scrollbar space-y-2 text-zinc-300">
                <!-- Text segments loaded dynamically via lyrics.js -->
            </div>
        </div>
    </div>

    <!-- ==========================================================================
       MODULAR ARCHITECTURE DEPENDENCY INJECTION STACK
       ========================================================================== -->
    <!-- 1. Identity context checks local tokens before visual render loops load -->
    <script src="js/auth.js"></script>
    <!-- 2. Secure resource delivery controller handles protected file transfers -->
    <script src="js/download.js"></script>
    <!-- 3. Core dynamic application engine reads songs.json and renders catalogs -->
    <script src="js/app.js"></script>
    <!-- 4. Audio media layout streaming controller coordinates timeline streams -->
    <script src="js/player.js"></script>
    <!-- 5. Live instant query string module filters grids on keypress -->
    <script src="js/search.js"></script>
    <!-- 6. Localized translation text asset file fetching processor -->
    <script src="js/lyrics.js"></script>
    <!-- 7. Analytics telemetry tracker updates view counters and triggers gtag tracking -->
    <script src="js/analytics.js"></script>
</body>
</html>
