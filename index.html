<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Music Production Studio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
    padding-bottom:90px;
}

.section{
    padding:20px;
}

.section h2{
    color:#ffcc00;
    margin-bottom:15px;
}

.song-grid,
.region-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#1d1d1d;
    padding:15px;
    border-radius:12px;
}

.song-thumb{
    width:100%;
    border-radius:10px;
}

.thumb-container{
    position:relative;
    cursor:pointer;
}

.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:30px;
}

.song-category{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    background:#ff9800;
    border-radius:20px;
    font-size:12px;
}

.song-actions{
    margin-top:15px;
}

.btn{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-right:5px;
}

.primary{
    background:#ff9800;
}

.secondary{
    background:#444;
    color:#fff;
}

.music-player{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#000;
    padding:10px;
    display:flex;
    align-items:center;
    gap:15px;
}

.music-player img{
    width:55px;
    height:55px;
    border-radius:8px;
}

.music-info{
    flex:1;
}

.player-btn{
    color:#fff;
    font-size:25px;
}
</style>
</head>

<body>

<section class="section">
    <h2>🌟 Featured Song</h2>
    <div id="featuredContainer"></div>
</section>

<section class="section">
    <h2>🆕 New Releases</h2>
    <div id="newReleasesContainer" class="song-grid"></div>
</section>

<section class="section">
    <h2>🔥 Latest Songs</h2>
    <div id="latestContainer" class="song-grid"></div>
</section>

<section class="section">
    <h2>🚀 Upcoming Releases</h2>
    <div id="upcomingContainer" class="song-grid"></div>
</section>

<section class="section">
    <h2>📰 News</h2>
    <div id="newsContainer" class="song-grid"></div>
</section>

<section class="section">
    <h2>🎵 Playlists</h2>
    <div id="playlistsContainer" class="song-grid"></div>
</section>

<section class="section">
    <h2>🌍 Regional Music</h2>
    <div id="languagesContainer"></div>
</section>

<div class="music-player">
    <img id="playerImage"
         src="logo.png">

    <div class="music-info">
        <h4 id="playerTitle">
            Select a Song
        </h4>

        <p>
            AI Music Production Studio
        </p>
    </div>

    <a id="playBtn"
       href="#"
       target="_blank"
       class="player-btn">
        <i class="fas fa-play"></i>
    </a>
</div>

<script>

// MUSIC PLAYER
function playSong(title, youtubeId){

    document.getElementById(
        'playerTitle'
    ).innerText = title;

    document.getElementById(
        'playerImage'
    ).src =
        `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;

    document.getElementById(
        'playBtn'
    ).href =
        `https://youtu.be/${youtubeId}`;
}

// LYRICS
function openLyrics(title,file){

    if(!file){
        alert(
            'Lyrics not available'
        );
        return;
    }

    window.open(
        file,
        '_blank'
    );
}

// CARD TEMPLATE
function createCard(song){

    const safeTitle =
        song.title.replace(
            /'/g,
            "\\'"
        );

    return `
    <div class="card">

        <h3>
            ${song.title}
        </h3>

        <div
            class="thumb-container"
            onclick="playSong(
                '${safeTitle}',
                '${song.youtubeId}'
            )">

            <img
                src="https://img.youtube.com/vi/${song.youtubeId}/hqdefault.jpg"
                class="song-thumb"
                onerror="
                    this.src='logo.png'
                ">

            <div class="play-overlay">
                ▶
            </div>

        </div>

        <p>
            ${song.language || ''}
        </p>

        <span class="song-category">
            ${song.category || ''}
        </span>

        <div class="song-actions">

            <button
                class="btn primary"
                onclick="playSong(
                    '${safeTitle}',
                    '${song.youtubeId}'
                )">

                ▶ Play

            </button>

            <button
                class="btn secondary"
                onclick="openLyrics(
                    '${safeTitle}',
                    '${song.lyricsFile || ''}'
                )">

                📄 Lyrics

            </button>

        </div>

    </div>
    `;
}

// LOAD JSON
fetch('songs.json')

.then(response=>{

    if(!response.ok){

        throw new Error(
            'songs.json not found'
        );

    }

    return response.json();

})

.then(data=>{

    console.log(
        'Loaded:',
        data
    );

    // FEATURED
    const featured =
        document.getElementById(
            'featuredContainer'
        );

    if(
        data.featuredSong &&
        featured
    ){

        featured.innerHTML =
            createCard(
                data.featuredSong
            );
    }

    // NEW RELEASES
    const releases =
        document.getElementById(
            'newReleasesContainer'
        );

    if(
        data.newReleases &&
        releases
    ){

        data.newReleases
        .forEach(song=>{

            releases.innerHTML +=
                createCard(song);

        });
    }

    // LATEST
    const latest =
        document.getElementById(
            'latestContainer'
        );

    if(
        data.latest &&
        latest
    ){

        data.latest
        .forEach(song=>{

            latest.innerHTML +=
                createCard(song);

        });
    }

    // UPCOMING
    const upcoming =
        document.getElementById(
            'upcomingContainer'
        );

    if(
        data.upcoming &&
        upcoming
    ){

        data.upcoming
        .forEach(song=>{

            upcoming.innerHTML += `
                <div class="card">

                    <h3>
                        ${song.title}
                    </h3>

                    <p>
                        ${song.language}
                    </p>

                    <span
                     class="song-category">

                        ${song.category}

                    </span>

                    <p
                     style="
                      margin-top:10px;
                      color:#0f0;
                     ">

                        ${song.releaseDate}

                    </p>

                </div>
            `;
        });
    }

    // NEWS
    const news =
        document.getElementById(
            'newsContainer'
        );

    if(
        data.news &&
        news
    ){

        data.news
        .forEach(item=>{

            news.innerHTML += `
                <div class="card">

                    <h3>
                        ${item.title}
                    </h3>

                    <p>
                        ${item.content}
                    </p>

                </div>
            `;
        });
    }

    // PLAYLISTS
    const playlists =
        document.getElementById(
            'playlistsContainer'
        );

    if(
        data.playlists &&
        playlists
    ){

        data.playlists
        .forEach(item=>{

            playlists.innerHTML += `
                <div class="card">

                    <h3>
                        ${item.title}
                    </h3>

                    <p>
                        ${item.description}
                    </p>

                </div>
            `;
        });
    }

    // LANGUAGES
    const languageContainer =
        document.getElementById(
            'languagesContainer'
        );

    if(
        data.languages &&
        languageContainer
    ){

        for(
            const language
            in
            data.languages
        ){

            const id =
                `lang-${
                    language
                    .toLowerCase()
                    .replace(
                        /\s+/g,
                        '-'
                    )
                }`;

            languageContainer
            .innerHTML += `

                <h3
                 style="
                  color:#ffcc00;
                  margin:
                  30px 0 15px;
                 ">

                    ${language} Hits

                </h3>

                <div
                  class="region-grid"
                  id="${id}">

                </div>
            `;

            const grid =
                document
                .getElementById(
                    id
                );

            data
            .languages[
                language
            ]
            .forEach(song=>{

                grid
                .innerHTML +=
                    createCard(
                        song
                    );

            });
        }
    }

})

.catch(error=>{

    console.error(
        'ERROR:',
        error
    );

});

</script>

</body>
</html>
