<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Access Gateway - Register Profile</title>
    <!-- FontAwesome Vector Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black text-white antialiased flex items-center justify-center min-h-screen p-4 selection:bg-emerald-500/30 selection:text-emerald-400">

    <div class="w-full max-w-sm bg-zinc-950 border border-zinc-900 rounded-2xl p-6 md:p-8 shadow-2xl space-y-6">
        
        <!-- Identity Branding Header -->
        <div class="text-center space-y-2">
            <a href="index.html" class="inline-flex items-center gap-2 group">
                <img src="logo/logo.png" alt="Studio Logo" class="w-7 h-7 rounded-lg group-hover:scale-105 transition-transform" onerror="this.src='logo.png'">
                <span class="font-black text-xs tracking-wider uppercase text-emerald-400">AI Studio</span>
            </a>
            <h1 class="text-lg font-black tracking-tight text-zinc-100 pt-2">Register Producer Account</h1>
            <p class="text-xs text-zinc-500">Establish your local identity record to track allocations.</p>
        </div>

        <!-- Registration Compilation Form -->
        <form id="studio-signup-form" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Producer Handle (Name)</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-[11px]"></i>
                    <input type="text" id="signup-name" required placeholder="John Doe"
                           class="w-full h-10 bg-zinc-900 border border-zinc-800 text-xs pl-9 pr-3 rounded focus:outline-none focus:border-emerald-500 text-white transition-colors">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Email Address</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-[11px]"></i>
                    <input type="email" id="signup-email" required placeholder="producer@studio.com"
                           class="w-full h-10 bg-zinc-900 border border-zinc-800 text-xs pl-9 pr-3 rounded focus:outline-none focus:border-emerald-500 text-white transition-colors">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Secure Access Key</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-zinc-600 text-[11px]"></i>
                    <input type="password" id="signup-password" required placeholder="••••••••"
                           class="w-full h-10 bg-zinc-900 border border-zinc-800 text-xs pl-9 pr-3 rounded focus:outline-none focus:border-emerald-500 text-white transition-colors">
                </div>
            </div>

            <p class="text-[10px] text-zinc-500 leading-normal">
                By compiling this profile, access credentials are cryptographically stored on your local browser sandboxed storage array.
            </p>

            <button type="submit" class="w-full h-10 bg-emerald-500 text-black font-bold text-xs rounded hover:bg-emerald-400 active:scale-[0.99] transition-all cursor-pointer shadow-md tracking-wider uppercase">
                Initialize Profile
            </button>
        </form>

        <div class="h-[1px] bg-zinc-900"></div>

        <!-- Footer Redirect Actions -->
        <p class="text-center text-xs text-zinc-500">
            Already have an active account? 
            <a href="login.html" class="text-emerald-400 font-bold hover:underline transition-all">Sign In Here</a>
        </p>
    </div>

    <!-- System Handshake Processing Layers -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const standaloneSignupForm = document.getElementById("studio-signup-form");
            if (standaloneSignupForm) {
                standaloneSignupForm.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const name = document.getElementById("signup-name").value;
                    const email = document.getElementById("signup-email").value;
                    const pass = document.getElementById("signup-password").value;

                    // Handshake directly to the local registration node compilation engine inside auth.js
                    const result = executeClientRegistration(name, email, pass);
                    alert(result.msg);

                    if (result.success) {
                        // Securely route fresh accounts straight to authentication validation checkpoint
                        window.location.href = "login.html";
                    }
                });
            }
        });
    </script>
</body>
</html>
