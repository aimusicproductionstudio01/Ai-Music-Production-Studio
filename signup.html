<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Ai Music Production Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- FIXED BACK LINK -->
    <div class="p-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-xs text-zinc-400 hover:text-white font-bold tracking-wider uppercase transition-colors">
            <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to Dashboard
        </a>
    </div>

    <!-- MAIN SIGNUP CARD -->
    <main class="w-full max-w-md mx-auto px-6 py-6">
        <div class="bg-zinc-900/50 border border-zinc-850 rounded-3xl p-8 space-y-5 shadow-2xl backdrop-blur-md">
            
            <!-- HEADER NODE -->
            <div class="space-y-1.5 text-center">
                <div class="flex justify-center">
                    <img src="logo.png" alt="Studio Logo" class="h-12 w-12 rounded-full object-cover border border-zinc-800">
                </div>
                <h1 class="text-2xl font-black tracking-wide text-white uppercase pt-2">Join the Studio</h1>
                <p class="text-xs text-zinc-400">Unlock track lyric sync features and streaming analytics dashboards.</p>
            </div>

            <!-- INTERACTIVE SIGNUP FORM -->
            <form id="auth-signup-form" onsubmit="handleUserSignup(event)" class="space-y-3.5">
                
                <div class="space-y-1.5">
                    <label for="signup-name" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Creative Studio Name / Alias</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                        <input type="text" id="signup-name" required placeholder="Producer / Listener Name" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none focus:border-emerald-500 text-zinc-200 transition-colors">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="signup-email" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Email Address</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                        <input type="email" id="signup-email" required placeholder="producer@studio.com" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none focus:border-emerald-500 text-zinc-200 transition-colors">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="signup-password" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Create Access Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                        <input type="password" id="signup-password" required minlength="6" placeholder="Minimum 6 characters" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none focus:border-emerald-500 text-zinc-200 transition-colors">
                    </div>
                </div>

                <!-- CONFIRM PASSWORD BLOCK -->
                <div class="space-y-1.5">
                    <label for="confirm-password" class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Confirm Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                        <input type="password" id="confirm-password" required placeholder="Confirm password" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-10 pr-4 py-3 text-xs focus:outline-none focus:border-emerald-500 text-zinc-200 transition-colors">
                    </div>
                </div>

                <div class="flex items-start gap-2.5 pt-1">
                    <input type="checkbox" id="terms-agree" required class="rounded border-zinc-800 bg-zinc-950 text-emerald-500 focus:ring-0 w-3.5 h-3.5 mt-0.5 cursor-pointer">
                    <label for="terms-agree" class="text-[10px] text-zinc-400 select-none leading-normal">
                        I explicitly agree to the studio's asset usage <a href="terms.html" class="text-emerald-400 underline font-semibold">Terms of Service</a> and content generation protocols.
                    </label>
                </div>

                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xs py-3.5 rounded-xl transition-all tracking-wider uppercase shadow-lg mt-2 cursor-pointer">
                    CREATE PRODUCTION IDENTITY <i class="fa-solid fa-user-plus ml-1 text-[10px]"></i>
                </button>
            </form>

            <div class="relative flex py-1 items-center text-[10px] text-zinc-600 font-bold uppercase tracking-widest">
                <div class="flex-grow border-t border-zinc-850"></div>
                <span class="flex-shrink mx-3">OR INSTANT SIGNUP</span>
                <div class="flex-grow border-t border-zinc-850"></div>
            </div>

            <!-- REGISTRATION ACCELERATORS -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="alert('Social loop mock active')" class="flex items-center justify-center gap-2 bg-zinc-950 hover:bg-zinc-900 border border-zinc-800 text-xs py-2.5 rounded-xl transition-colors font-medium text-zinc-300 cursor-pointer">
                    <i class="fa-brands fa-google text-red-500"></i> Google
                </button>
                <button onclick="alert('Social loop mock active')" class="flex items-center justify-center gap-2 bg-zinc-950 hover:bg-zinc-900 border border-zinc-800 text-xs py-2.5 rounded-xl transition-colors font-medium text-zinc-300 cursor-pointer">
                    <i class="fa-brands fa-facebook text-blue-500"></i> Facebook
                </button>
            </div>

            <!-- FOOTER SWITCHLINK -->
            <p class="text-center text-xs text-zinc-500 pt-2">
                Already have a profile identity? <a href="login.html" class="text-emerald-400 font-bold hover:underline">Log in here</a>
            </p>

        </div>
    </main>

    <!-- CLEAN SYSTEM FOOTER -->
    <footer class="text-center py-6 text-[11px] text-zinc-600 border-t border-zinc-900 bg-zinc-950">
        &copy; 2026 Ai Music Production Studio. Verification pipelines protected by structural encryption nodes.
    </footer>

    <!-- INTERACTIVE SYSTEM SCRIPT HUB -->
    <script>
        // AUTOMATIC REDIRECT IF ALREADY LOGGED IN
        if (localStorage.getItem("loggedIn")) {
            window.location = "index.html";
        }

        // IMPROVED SIGNUP ENGINE
        function handleUserSignup(event) {
            event.preventDefault();

            const name = document.getElementById("signup-name").value.trim();
            const email = document.getElementById("signup-email").value.trim().toLowerCase();
            const password = document.getElementById("signup-password").value;
            const confirmPassword = document.getElementById("confirm-password").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            if (password.length < 6) {
                alert("Password must contain at least 6 characters.");
                return;
            }

            if (localStorage.getItem("user_" + email)) {
                alert("User already exists.");
                return;
            }

            const user = {
                name,
                email,
                password: btoa(password),
                avatar: "logo.png",
                created: new Date().toISOString()
            };

            localStorage.setItem("user_" + email, JSON.stringify(user));
            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("currentUser", email);

            alert("Signup successful!");
            window.location = "index.html";
        }
    </script>
</body>
</html>
